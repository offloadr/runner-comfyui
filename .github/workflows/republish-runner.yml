name: Republish runner image to GHCR

on:
  workflow_dispatch:
    inputs:
      source_tag:
        description: Source image tag to mirror from oci.offloadr.app
        required: false
        type: string
      source_sha:
        description: Source commit SHA for logging
        required: false
        type: string
      source_repo:
        description: Source repository for logging
        required: false
        type: string
  schedule:
    - cron: "17 3 * * *"

permissions:
  contents: read
  packages: write

concurrency:
  group: republish-runner-ghcr
  cancel-in-progress: false

env:
  DEST_IMAGE: ghcr.io/${{ github.repository_owner }}/runner-nvidia:latest

jobs:
  republish:
    runs-on: ubuntu-latest

    steps:
      - name: Resolve source image
        id: resolve_source
        env:
          DISPATCH_SOURCE_REPO: ${{ inputs.source_repo }}
          DISPATCH_SOURCE_SHA: ${{ inputs.source_sha }}
          DISPATCH_SOURCE_TAG: ${{ inputs.source_tag }}
        run: |
          source_tag="${DISPATCH_SOURCE_TAG:-latest}"
          source_image="oci.offloadr.app/runner/nvidia:${source_tag}"

          echo "source_image=${source_image}" >> "${GITHUB_OUTPUT}"
          echo "Using source image: ${source_image}"

          if [ -n "${DISPATCH_SOURCE_REPO:-}" ]; then
            echo "Source repository: ${DISPATCH_SOURCE_REPO}"
          fi

          if [ -n "${DISPATCH_SOURCE_SHA:-}" ]; then
            echo "Source revision: ${DISPATCH_SOURCE_SHA}"
          fi

      - name: Install skopeo
        run: |
          sudo apt-get update
          sudo apt-get install -y skopeo

      - name: Log in to GHCR
        run: |
          echo "${{ secrets.GITHUB_TOKEN }}" | \
            skopeo login ghcr.io \
              --username "${{ github.actor }}" \
              --password-stdin

      - name: Copy image from source registry to GHCR
        run: |
          skopeo copy --all \
            docker://${{ steps.resolve_source.outputs.source_image }} \
            docker://${DEST_IMAGE}

      - name: Verify copied digest
        run: |
          src_digest="$(skopeo inspect --format '{{.Digest}}' docker://${{ steps.resolve_source.outputs.source_image }})"
          dest_digest="$(skopeo inspect --format '{{.Digest}}' docker://${DEST_IMAGE})"

          echo "Source digest: ${src_digest}"
          echo "Destination digest: ${dest_digest}"

          if [ "${src_digest}" != "${dest_digest}" ]; then
            echo "Mirrored digest does not match source digest" >&2
            exit 1
          fi
